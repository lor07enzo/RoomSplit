name: CI/CD RoomSplit - Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'RoomSplit-be/**'
      - 'RoomSplit-fe/**'
      - '.github/workflows/pipeline.yml'

jobs:
  sonarcloud-and-delivery:
    runs-on: ubuntu-latest

    steps:
      # Scarica il codice del repository
      - name: Checkout del codice
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      # Esegue la scansione di SonarCloud (Analisi statica)
      - name: Scansione SonarCloud
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Gestito automaticamente da GitHub
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}   # Il secret che hai salvato prima

      # Setup di Docker Buildx (Eseguito solo se SonarCloud passa con successo)
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login su Docker Hub
      - name: Login su Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build e Delivery dell'immagine finale
      - name: Build e Push dell'immagine del Backend
        uses: docker/build-push-action@v5
        with:
          context: ./RoomSplit-be
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/roomsplit-backend:latest
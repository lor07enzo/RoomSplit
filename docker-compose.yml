services:
  # IL TUO DATABASE PRINCIPALE (Postgres)
  db:
    image: postgres:15
    container_name: roomsplit_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=roomsplit_db
    ports:
      - "5432:5432" # Permette a PGAdmin di collegarsi al container!
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./RoomSplit-be
    container_name: roomsplit_backend
    volumes:
      - ./RoomSplit-be:/app
    ports:
      - "8000:8000"
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      - DEBUG=1
      - DB_NAME=roomsplit_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # SEZIONE SONARQUBE LOCALE
  sonarqube:
    image: sonarqube:community
    container_name: roomsplit_sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://db-sonar:5432/sonar
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar
    depends_on:
      - db-sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions

  db-sonar:
    image: postgres:15
    container_name: roomsplit_db_sonar
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar
      - POSTGRES_DB=sonar
    volumes:
      - postgres_sonar_data:/var/lib/postgresql/data

volumes:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  postgres_sonar_data:
  postgres_data: